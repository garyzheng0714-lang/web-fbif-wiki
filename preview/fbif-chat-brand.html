<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FBIF 智能助手</title>
  <style>
    :root {
      --primary: #005CB2;
      --primary-hover: #00498D;
      --primary-soft: #edf6ff;
      --bg-page: #f5f8fc;
      --bg-card: #ffffff;
      --bg-message: #f7f9fc;
      --text-main: #17212f;
      --text-sub: #5a667a;
      --border: #dbe3ef;
      --error: #d93025;
      --success: #117a37;
      --shadow: 0 8px 30px rgba(0, 36, 84, 0.08);
      --radius-xl: 18px;
      --radius-md: 12px;
      --font: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: var(--font);
      color: var(--text-main);
      background:
        radial-gradient(circle at 10% 5%, rgba(0, 92, 178, 0.09), transparent 35%),
        radial-gradient(circle at 95% 5%, rgba(0, 92, 178, 0.07), transparent 25%),
        var(--bg-page);
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 36px 16px;
    }

    .hero {
      margin-bottom: 18px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      flex-wrap: wrap;
    }

    .hero-title {
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .hero-sub {
      margin-top: 8px;
      color: var(--text-sub);
      font-size: 14px;
    }

    .status-pill {
      background: var(--primary-soft);
      color: var(--primary);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .chat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 74vh;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #ffffff 0%, #f9fbff 100%);
    }

    .chat-avatar {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      object-fit: cover;
    }

    .chat-title {
      font-weight: 700;
      font-size: 16px;
      line-height: 1.1;
    }

    .chat-subtitle {
      color: var(--text-sub);
      font-size: 12px;
      margin-top: 3px;
    }

    .messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: var(--bg-message);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      max-width: 85%;
      display: flex;
      gap: 8px;
      align-items: flex-start;
      animation: rise 0.16s ease-out;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.assistant {
      align-self: flex-start;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .bubble {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.65;
      white-space: normal;
      word-break: break-word;
    }

    .message.user .bubble {
      color: #ffffff;
      border-color: transparent;
      background: linear-gradient(160deg, #005cb2 0%, #1c79d9 100%);
    }

    .message.assistant .bubble.streaming::after {
      content: "";
      display: inline-block;
      width: 6px;
      height: 1em;
      margin-left: 3px;
      vertical-align: text-bottom;
      background: var(--primary);
      animation: blink 0.9s steps(1, end) infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    .notice {
      margin: 0 16px 14px;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      background: var(--primary-soft);
      color: var(--primary);
      border: 1px solid #d8eafe;
    }

    .notice.error {
      background: #fff3f2;
      border-color: #ffd8d6;
      color: var(--error);
    }

    .notice.success {
      background: #edf9f1;
      border-color: #d0efdb;
      color: var(--success);
    }

    .chat-form {
      border-top: 1px solid var(--border);
      background: #ffffff;
      padding: 14px 16px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .chat-input {
      flex: 1;
      min-height: 40px;
      max-height: 128px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fafcff;
      color: var(--text-main);
      font-size: 14px;
      line-height: 1.45;
      padding: 9px 11px;
      resize: none;
      font-family: inherit;
    }

    .chat-input:focus {
      outline: none;
      border-color: #8fc0f1;
      box-shadow: 0 0 0 3px rgba(0, 92, 178, 0.1);
      background: #ffffff;
    }

    .send-btn {
      border: 0;
      width: 42px;
      height: 42px;
      border-radius: 11px;
      background: var(--primary);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease;
      flex-shrink: 0;
    }

    .send-btn:hover:enabled {
      transform: translateY(-1px);
      background: var(--primary-hover);
    }

    .send-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .input-tip {
      font-size: 11px;
      color: var(--text-sub);
      margin-top: 8px;
      text-align: center;
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      object-fit: cover;
      background: #dbe8f8;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #19508e;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .page {
        padding: 18px 12px;
      }

      .hero-title {
        font-size: 22px;
      }

      .chat-card {
        min-height: 82vh;
      }

      .message {
        max-width: 94%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div>
        <h1 class="hero-title">FBIF 智能助手</h1>
        <p class="hero-sub">连接火山方舟知识库 · 支持多轮对话与流式输出</p>
      </div>
      <div class="status-pill">Live Streaming</div>
    </section>

    <section class="chat-card">
      <header class="chat-header">
        <img
          class="chat-avatar"
          id="headerAvatar"
          alt="FBIF"
        >
        <div>
          <div class="chat-title">FBIF Knowledge Chat</div>
          <div class="chat-subtitle" id="subtitle">已就绪，等待提问</div>
        </div>
      </header>

      <div class="messages" id="messages"></div>

      <div class="notice" id="notice">
        启动前请设置环境变量：VOLC_API_KEY、VOLC_SERVICE_RESOURCE_ID。
      </div>

      <form class="chat-form" id="chatForm">
        <div class="input-row">
          <textarea
            id="input"
            class="chat-input"
            placeholder="请输入你的问题，例如：FBIF2026 有哪些展商？"
            rows="1"
            required
          ></textarea>
          <button class="send-btn" id="sendBtn" type="submit" aria-label="发送">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <p class="input-tip">Enter 发送，Shift + Enter 换行</p>
      </form>
    </section>
  </main>

  <script>
    const assistantAvatarUrl = "https://fbif-feishu-base.oss-cn-shanghai.aliyuncs.com/fbif-attachment-to-url/2026/03/tblMQeXvSGd7Hebf_64441f85vYBjZN6VXlZ7mA_1773986737516/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260320133605_1541_594_1773986737699.png";

    const state = {
      history: [],
      isStreaming: false
    };

    document.getElementById("headerAvatar").src = assistantAvatarUrl;

    const messagesEl = document.getElementById("messages");
    const noticeEl = document.getElementById("notice");
    const subtitleEl = document.getElementById("subtitle");
    const inputEl = document.getElementById("input");
    const formEl = document.getElementById("chatForm");
    const sendBtnEl = document.getElementById("sendBtn");

    function escapeHTML(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatText(text) {
      return escapeHTML(text).replace(/\n/g, "<br>");
    }

    let scrollRAF = null;
    function scrollToBottom() {
      if (!scrollRAF) {
        scrollRAF = requestAnimationFrame(() => {
          messagesEl.scrollTop = messagesEl.scrollHeight;
          scrollRAF = null;
        });
      }
    }

    function setNotice(text, type = "info") {
      noticeEl.textContent = text;
      noticeEl.className = "notice";
      if (type === "error") {
        noticeEl.classList.add("error");
      } else if (type === "success") {
        noticeEl.classList.add("success");
      }
    }

    function setInputEnabled(enabled) {
      state.isStreaming = !enabled;
      inputEl.disabled = !enabled;
      sendBtnEl.disabled = !enabled;
      subtitleEl.textContent = enabled ? "已就绪，等待提问" : "知识库回答中...";
    }

    function autoResizeTextarea() {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 128) + "px";
    }

    function createAvatar(role) {
      const avatar = document.createElement(role === "assistant" ? "img" : "div");
      avatar.className = "avatar";

      if (role === "assistant") {
        avatar.src = assistantAvatarUrl;
        avatar.alt = "FBIF";
      } else {
        avatar.textContent = "我";
      }

      return avatar;
    }

    function appendMessage(role, text, options = {}) {
      const wrapper = document.createElement("div");
      wrapper.className = `message ${role}`;

      const avatar = createAvatar(role);
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      if (options.streaming) {
        bubble.classList.add("streaming");
      }
      bubble.innerHTML = formatText(text);

      wrapper.appendChild(avatar);
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      scrollToBottom();

      return bubble;
    }

    function parseSSEChunk(rawChunk) {
      let event = "message";
      const dataLines = [];

      for (const line of rawChunk.split("\n")) {
        if (line.startsWith("event:")) {
          event = line.slice(6).trim();
        } else if (line.startsWith("data:")) {
          dataLines.push(line.slice(5).trim());
        }
      }

      return {
        event: event,
        data: dataLines.join("\n")
      };
    }

    async function streamAnswer(message, historySnapshot, assistantBubble) {
      const response = await fetch("/api/chat/stream", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: message,
          history: historySnapshot
        })
      });

      if (!response.ok) {
        let detail = `HTTP ${response.status}`;
        try {
          const rawText = await response.text();
          if (rawText) {
            try {
              const errorPayload = JSON.parse(rawText);
              detail = errorPayload.detail || errorPayload.error || detail;
            } catch (_) {
              detail = rawText;
            }
          }
        } catch (_) { /* ignore */ }
        throw new Error(detail);
      }

      if (!response.body) {
        throw new Error("浏览器不支持流式响应");
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let finalAnswer = "";
      let renderRAF = null;

      function scheduleRender() {
        if (!renderRAF) {
          renderRAF = requestAnimationFrame(() => {
            assistantBubble.innerHTML = formatText(finalAnswer);
            scrollToBottom();
            renderRAF = null;
          });
        }
      }

      while (true) {
        const result = await reader.read();
        if (result.done) {
          break;
        }

        buffer += decoder.decode(result.value, { stream: true }).replaceAll("\r\n", "\n");

        let separatorIndex = buffer.indexOf("\n\n");
        while (separatorIndex !== -1) {
          const rawChunk = buffer.slice(0, separatorIndex).trim();
          buffer = buffer.slice(separatorIndex + 2);

          if (rawChunk.length > 0) {
            const parsed = parseSSEChunk(rawChunk);
            if (parsed.data) {
              const payload = JSON.parse(parsed.data);

              if (parsed.event === "token") {
                finalAnswer += payload.token || "";
                scheduleRender();
              }

              if (parsed.event === "error") {
                throw new Error(payload.error || "知识库服务返回错误");
              }

              if (parsed.event === "done" && payload.answer) {
                finalAnswer = payload.answer;
              }
            }
          }

          separatorIndex = buffer.indexOf("\n\n");
        }
      }

      if (renderRAF) {
        cancelAnimationFrame(renderRAF);
      }
      assistantBubble.innerHTML = formatText(finalAnswer);
      scrollToBottom();
      return finalAnswer.trim();
    }

    async function sendMessage() {
      const message = inputEl.value.trim();
      if (!message || state.isStreaming) {
        return;
      }

      const historySnapshot = [...state.history];
      appendMessage("user", message);
      state.history.push({ role: "user", content: message });

      inputEl.value = "";
      autoResizeTextarea();
      setInputEnabled(false);

      const assistantBubble = appendMessage("assistant", "", { streaming: true });

      try {
        const answer = await streamAnswer(message, historySnapshot, assistantBubble);
        const safeAnswer = answer || "我暂时没有检索到结果，可以换个问法试试。";
        assistantBubble.innerHTML = formatText(safeAnswer);
        state.history.push({ role: "assistant", content: safeAnswer });
        setNotice("已连接知识库服务，正在流式返回答案。", "success");
      } catch (error) {
        const detail = error instanceof Error ? error.message : "未知错误";
        assistantBubble.innerHTML = formatText(`抱歉，知识库调用失败。\n${detail}`);
        state.history.push({ role: "assistant", content: `调用失败：${detail}` });
        setNotice(`请求失败：${detail}`, "error");
      } finally {
        assistantBubble.classList.remove("streaming");
        setInputEnabled(true);
        inputEl.focus();
      }
    }

    formEl.addEventListener("submit", async function(event) {
      event.preventDefault();
      await sendMessage();
    });

    inputEl.addEventListener("input", autoResizeTextarea);

    inputEl.addEventListener("keydown", async function(event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        await sendMessage();
      }
    });

    function bootstrap() {
      const greeting = "你好，我是 FBIF 智能助手。你可以直接问我展会、展商、文章、票务等问题。";
      appendMessage("assistant", greeting);
      state.history.push({ role: "assistant", content: greeting });
      inputEl.focus();
      autoResizeTextarea();
    }

    bootstrap();
  </script>
</body>
</html>
