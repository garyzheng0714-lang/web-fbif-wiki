<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="FBIF食品饮料创新论坛智能助手">
<meta name="theme-color" content="#0052FF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>FBIF 智能助手</title>
<link rel="icon" href="https://fbif-feishu-base.oss-cn-shanghai.aliyuncs.com/fbif-attachment-to-url/2026/03/tblMQeXvSGd7Hebf_64441f85vYBjZN6VXlZ7mA_1773986737516/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260320133605_1541_594_1773986737699.png" type="image/png">
<link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --brand-blue: #0052FF;
  --brand-blue-light: #EBF1FF;
  --brand-blue-hover: #0047E0;
  --brand-gold: #F5C518;
  --bg: #F7F8FA;
  --surface: #FFFFFF;
  --border: #E4E7ED;
  --text: #1D2129;
  --text-secondary: #86909C;
  --text-tertiary: #C9CDD4;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --max-w: 720px;
}

html, body, #app {
  height: 100%;
  font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

#app { display: flex; flex-direction: column; }

/* ── Header ── */
.chat-header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  padding: 12px 20px;
  background: var(--brand-blue);
  color: #fff;
  z-index: 10;
}

.header-logo {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  object-fit: cover;
  margin-right: 12px;
}

.header-info h1 {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.01em;
  line-height: 1.3;
}

.header-info p {
  font-size: 12px;
  opacity: 0.75;
  margin-top: 1px;
}

.header-actions { margin-left: auto; }

.header-actions .el-button {
  color: rgba(255,255,255,0.85) !important;
  border-color: rgba(255,255,255,0.3) !important;
  background: rgba(255,255,255,0.1) !important;
  font-size: 12px;
  padding: 7px 12px;
}
.header-actions .el-button:hover {
  color: #fff !important;
  border-color: rgba(255,255,255,0.5) !important;
  background: rgba(255,255,255,0.2) !important;
}

/* ── Messages ── */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 20px 16px;
}

.messages-inner {
  max-width: var(--max-w);
  margin: 0 auto;
}

/* ── Welcome ── */
.welcome-card {
  text-align: center;
  padding: 48px 24px 36px;
  background: var(--surface);
  border-radius: var(--radius-xl);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}

.welcome-avatar {
  width: 64px;
  height: 64px;
  border-radius: 16px;
  object-fit: cover;
  margin-bottom: 16px;
  box-shadow: var(--shadow-md);
}

.welcome-card h2 {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}

.welcome-card > p {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
  max-width: 380px;
  margin: 0 auto 24px;
}

.suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

.suggestion-btn {
  font-size: 13px;
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
  line-height: 1.4;
  font-family: inherit;
}

.suggestion-btn:hover {
  background: var(--brand-blue-light);
  border-color: var(--brand-blue);
  color: var(--brand-blue);
}
.suggestion-btn:active { transform: scale(0.97); }

/* ── Bubbles ── */
.msg {
  margin-bottom: 16px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
  animation: msgIn 0.25s ease;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.user { flex-direction: row-reverse; }

.msg-avatar, .msg-avatar-user {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  flex-shrink: 0;
}

.msg-avatar { object-fit: cover; }

.msg-avatar-user {
  background: var(--brand-blue-light);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--brand-blue);
  font-size: 14px;
  font-weight: 600;
}

.bubble {
  max-width: 78%;
  padding: 12px 16px;
  font-size: 14px;
  line-height: 1.7;
  word-break: break-word;
}

.msg.user .bubble {
  background: var(--brand-blue);
  color: #fff;
  border-radius: var(--radius-lg) var(--radius-lg) var(--radius-sm) var(--radius-lg);
  box-shadow: 0 2px 8px rgba(0,82,255,0.2);
}

.msg.assistant .bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg) var(--radius-lg) var(--radius-lg) var(--radius-sm);
  box-shadow: var(--shadow-sm);
}

.msg.error .bubble {
  background: #FEF0F0;
  border: 1px solid #FDE2E2;
  color: #F56C6C;
  border-radius: var(--radius-lg) var(--radius-lg) var(--radius-lg) var(--radius-sm);
}

/* Markdown */
.bubble ul, .bubble ol { margin: 6px 0; padding-left: 20px; }
.bubble li { margin-bottom: 4px; }
.bubble p { margin-bottom: 8px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble strong { font-weight: 600; }
.bubble a { color: var(--brand-blue); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.15s; }
.bubble a:hover { border-bottom-color: var(--brand-blue); }
.bubble img { max-width: 100%; border-radius: var(--radius-md); margin: 8px 0; display: block; cursor: pointer; transition: opacity 0.15s; }
.bubble img:hover { opacity: 0.9; }

/* Lightbox */
.lightbox {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000;
  display: flex; align-items: center; justify-content: center; padding: 20px;
  cursor: zoom-out; animation: msgIn 0.15s ease;
}
.lightbox img { max-width: 90vw; max-height: 90vh; border-radius: var(--radius-md); object-fit: contain; }

/* Typing */
.typing { display: inline-flex; gap: 5px; align-items: center; padding: 12px 16px; }
.typing .dot {
  width: 7px; height: 7px; background: var(--brand-blue); border-radius: 50%;
  opacity: 0.4; animation: pulse 1.4s infinite;
}
.typing .dot:nth-child(2) { animation-delay: 0.2s; }
.typing .dot:nth-child(3) { animation-delay: 0.4s; }
.typing-hint { font-size: 12px; color: var(--text-secondary); margin-top: 6px; padding-left: 16px; }

@keyframes pulse {
  0%, 60%, 100% { opacity: 0.4; transform: scale(1); }
  30% { opacity: 1; transform: scale(1.15); }
}

/* ── Input ── */
.chat-input-area {
  flex-shrink: 0;
  padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  background: var(--surface);
  border-top: 1px solid var(--border);
}

.input-inner {
  max-width: var(--max-w);
  margin: 0 auto;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.input-inner .el-textarea__inner {
  border-radius: var(--radius-lg) !important;
  padding: 10px 14px !important;
  font-size: 14px !important;
  font-family: inherit !important;
  line-height: 1.5 !important;
  min-height: 44px !important;
  max-height: 120px;
  resize: none !important;
  background: var(--bg) !important;
  border-color: var(--border) !important;
}

.input-inner .el-textarea__inner:focus {
  border-color: var(--brand-blue) !important;
  box-shadow: 0 0 0 2px rgba(0,82,255,0.1) !important;
}

.send-btn {
  flex-shrink: 0; width: 44px; height: 44px; border-radius: var(--radius-lg);
  background: var(--brand-blue); border: none; color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  font-family: inherit;
}
.send-btn:hover:not(:disabled) { background: var(--brand-blue-hover); box-shadow: 0 2px 8px rgba(0,82,255,0.3); }
.send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.send-btn:active:not(:disabled) { transform: scale(0.95); }
.send-btn svg { width: 18px; height: 18px; }

/* ── Mobile ── */
@media (max-width: 480px) {
  .chat-header { padding: 10px 14px; }
  .header-logo { width: 32px; height: 32px; border-radius: var(--radius-md); }
  .header-info h1 { font-size: 15px; }
  .welcome-card { padding: 32px 16px 28px; }
  .welcome-card h2 { font-size: 19px; }
  .welcome-avatar { width: 52px; height: 52px; border-radius: 14px; }
  .bubble { max-width: 88%; font-size: 14px; }
  .suggestion-btn { font-size: 13px; padding: 7px 14px; }
}
</style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <header class="chat-header">
    <img class="header-logo" :src="avatarUrl" alt="FBIF">
    <div class="header-info">
      <h1>FBIF 智能助手</h1>
      <p>食品饮料创新论坛 · 有问必答</p>
    </div>
    <div class="header-actions" v-if="messages.length > 0">
      <el-button size="small" icon="el-icon-refresh" @click="resetChat">新对话</el-button>
    </div>
  </header>

  <!-- Messages -->
  <main class="chat-messages" ref="messagesRef" @click="handleBubbleClick">
    <div class="messages-inner">
      <!-- Welcome -->
      <div class="welcome-card" v-if="messages.length === 0">
        <img class="welcome-avatar" :src="avatarUrl" alt="FBIF">
        <h2>你好，有什么想了解的？</h2>
        <p>我是 FBIF 智能助手，可以回答关于展会时间、地点、嘉宾、票务等各类问题</p>
        <div class="suggestions">
          <button class="suggestion-btn" v-for="s in suggestions" :key="s" @click="askSuggestion(s)">{{ s }}</button>
        </div>
      </div>

      <!-- Messages -->
      <div v-for="(msg, i) in messages" :key="i"
           :class="['msg', msg.role, msg.isError ? 'error' : '']">
        <template v-if="msg.role === 'assistant' || msg.isError">
          <img class="msg-avatar" :src="avatarUrl" alt="FBIF">
        </template>
        <template v-else>
          <div class="msg-avatar-user">我</div>
        </template>
        <div class="bubble" v-html="msg.role === 'user' ? escapeHtml(msg.content) : renderContent(msg.content, msg.images, msg)"></div>
      </div>

      <!-- Typing -->
      <div class="msg assistant" v-if="loading">
        <img class="msg-avatar"
             src="https://fbif-feishu-base.oss-cn-shanghai.aliyuncs.com/fbif-attachment-to-url/2026/03/tblMQeXvSGd7Hebf_64441f85vYBjZN6VXlZ7mA_1773986737516/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260320133605_1541_594_1773986737699.png"
             alt="FBIF">
        <div class="bubble">
          <div class="typing">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          </div>
          <div class="typing-hint" v-if="showTypingHint">正在生成回答…</div>
        </div>
      </div>
    </div>
  </main>

  <!-- Input -->
  <div class="chat-input-area">
    <div class="input-inner">
      <el-input
        ref="inputRef"
        type="textarea"
        v-model="query"
        :autosize="{ minRows: 1, maxRows: 4 }"
        placeholder="输入你的问题…"
        @keydown.enter.native="handleKey"
      ></el-input>
      <button class="send-btn" @click="send" :disabled="!query.trim() || loading">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13"></path>
          <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
        </svg>
      </button>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" v-if="lightboxSrc" @click="lightboxSrc = null">
    <img :src="lightboxSrc" alt="图片">
  </div>
</div>

<script src="https://unpkg.com/vue@2/dist/vue.min.js"></script>
<script src="https://unpkg.com/element-ui/lib/index.js"></script>
<script>
new Vue({
  el: '#app',
  data: {
    avatarUrl: 'https://fbif-feishu-base.oss-cn-shanghai.aliyuncs.com/fbif-attachment-to-url/2026/03/tblMQeXvSGd7Hebf_64441f85vYBjZN6VXlZ7mA_1773986737516/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260320133605_1541_594_1773986737699.png',
    query: '',
    messages: [],
    loading: false,
    showTypingHint: false,
    lightboxSrc: null,
    history: [],
    typingTimer: null,
    abortController: null,
    suggestions: [
      'FBIF2025什么时候举办？',
      '怎么买票？',
      '有哪些重磅嘉宾？',
      '第一次参加怎么准备？'
    ]
  },
  methods: {
    escapeHtml: function(text) {
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    },
    renderMarkdown: function(text) {
      var escaped = this.escapeHtml(text);
      return escaped
        .replace(/(https?:\/\/[^\s<\u4e00-\u9fff\uff00-\uffef\u3000-\u303f，。、；：（）]+)/g,
          '<a href="$1" target="_blank" rel="noopener">$1</a>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/^[•\-]\s+(.+)$/gm, '<li>$1</li>')
        .replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>')
        .replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br>')
        .replace(/^(.+)/, '<p>$1</p>')
        .replace(/<p><\/p>/g, '');
    },
    renderImages: function(html, images) {
      if (!images || Object.keys(images).length === 0) return html;
      return html.replace(/&lt;illustration\s+data-ref=&quot;([^&]+)&quot;&gt;&lt;\/illustration&gt;/g,
        function(match, pointId) {
          var url = images[pointId];
          return url ? '<img src="' + encodeURI(url) + '" alt="配图" loading="lazy">' : '';
        });
    },
    renderContent: function(content, images, msg) {
      if (msg && msg._renderedHtml) return msg._renderedHtml;
      var cleaned = content.replace(/<reference[^>]*><\/reference>/g, '');
      var rendered = this.renderMarkdown(cleaned);
      rendered = this.renderImages(rendered, images);
      rendered = rendered.replace(/&lt;illustration[^&]*&gt;&lt;\/illustration&gt;/g, '');
      if (msg) msg._renderedHtml = rendered;
      return rendered;
    },
    handleBubbleClick: function(e) {
      if (e.target.tagName === 'IMG' && e.target.closest('.bubble')) {
        this.lightboxSrc = e.target.src;
      }
    },
    focusInput: function() {
      var self = this;
      this.$nextTick(function() {
        if (self.$refs.inputRef) self.$refs.inputRef.focus();
      });
    },
    scrollBottom: function() {
      var self = this;
      this.$nextTick(function() {
        var el = self.$refs.messagesRef;
        if (el) el.scrollTop = el.scrollHeight;
      });
    },
    askSuggestion: function(text) {
      this.query = text;
      this.send();
    },
    resetChat: function() {
      if (this.abortController) {
        this.abortController.abort();
        this.abortController = null;
      }
      clearTimeout(this.typingTimer);
      this.messages = [];
      this.history = [];
      this.query = '';
      this.loading = false;
      this.showTypingHint = false;
      this.focusInput();
    },
    handleKey: function(e) {
      if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
        e.preventDefault();
        this.send();
      }
    },
    send: async function() {
      var q = this.query.trim();
      if (!q || this.loading) return;

      this.loading = true;
      this.showTypingHint = false;
      this.query = '';
      this.messages.push({ role: 'user', content: q });
      this.scrollBottom();

      var self = this;
      this.typingTimer = setTimeout(function() { self.showTypingHint = true; }, 5000);

      this.abortController = new AbortController();
      var timeout = setTimeout(function() { self.abortController.abort(); }, 60000);

      try {
        var res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: q, messages: this.history, stream: false }),
          signal: this.abortController.signal,
        });
        clearTimeout(timeout);

        if (!res.ok) {
          this.messages.push({ role: 'assistant', content: '服务暂时不可用，请稍后再试。', isError: true });
        } else {
          var data = await res.json();
          if (data.data && data.data.generated_answer) {
            var answer = data.data.generated_answer;
            var images = data.data.images || {};
            this.messages.push({ role: 'assistant', content: answer, images: images });
            this.history.push({ role: 'user', content: q });
            this.history.push({ role: 'assistant', content: answer });
            if (this.history.length > 12) this.history = this.history.slice(-12);
          } else {
            this.messages.push({ role: 'assistant', content: '暂时无法回答这个问题，请尝试换个说法。', isError: true });
          }
        }
      } catch (err) {
        clearTimeout(timeout);
        if (err.name === 'AbortError' && !this.loading) return;
        var msg = err.name === 'AbortError' ? '回答超时了，请稍后重试。' : '网络连接失败，请检查网络后重试。';
        this.messages.push({ role: 'assistant', content: msg, isError: true });
      }

      this.abortController = null;
      clearTimeout(this.typingTimer);
      this.loading = false;
      this.showTypingHint = false;
      this.scrollBottom();
      this.focusInput();
    }
  }
});
</script>
</body>
</html>
